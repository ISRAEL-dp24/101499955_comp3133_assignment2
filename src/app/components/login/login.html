<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Employee Management</h2>
      <p>Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          class="form-control"
          formControlName="username"
          placeholder="Enter your username"
          [class.is-invalid]="username?.invalid && username?.touched"
        />
        <div class="invalid-feedback" *ngIf="username?.invalid && username?.touched">
          Username is required
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="Enter your password"
          [class.is-invalid]="password?.invalid && password?.touched"
        />
        <div class="invalid-feedback" *ngIf="password?.errors?.['required'] && password?.touched">
          Password is required
        </div>
        <div class="invalid-feedback" *ngIf="password?.errors?.['minlength'] && password?.touched">
          Password must be at least 6 characters
        </div>
      </div>

      <div class="alert alert-danger" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary-custom" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>

      <p class="auth-link">
        Don't have an account? <a routerLink="/signup">Sign up</a>
      </p>
    </form>
  </div>
</div>
