<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Join the Employee Management System</p>
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          class="form-control"
          formControlName="username"
          placeholder="Choose a username"
          [class.is-invalid]="username?.invalid && username?.touched"
        />
        <div class="invalid-feedback" *ngIf="username?.errors?.['required'] && username?.touched">
          Username is required
        </div>
        <div class="invalid-feedback" *ngIf="username?.errors?.['minlength'] && username?.touched">
          Username must be at least 3 characters
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          class="form-control"
          formControlName="email"
          placeholder="Enter your email"
          [class.is-invalid]="email?.invalid && email?.touched"
        />
        <div class="invalid-feedback" *ngIf="email?.errors?.['required'] && email?.touched">
          Email is required
        </div>
        <div class="invalid-feedback" *ngIf="email?.errors?.['email'] && email?.touched">
          Please enter a valid email address
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="Create a password"
          [class.is-invalid]="password?.invalid && password?.touched"
        />
        <div class="invalid-feedback" *ngIf="password?.errors?.['required'] && password?.touched">
          Password is required
        </div>
        <div class="invalid-feedback" *ngIf="password?.errors?.['minlength'] && password?.touched">
          Password must be at least 6 characters
        </div>
      </div>

      <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>

      <button type="submit" class="btn-primary-custom" [disabled]="loading">
        {{ loading ? 'Creating Account...' : 'Create Account' }}
      </button>

      <p class="auth-link">
        Already have an account? <a routerLink="/login">Sign in</a>
      </p>
    </form>
  </div>
</div>
